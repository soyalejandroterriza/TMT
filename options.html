<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NG CPT - Configuración</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        label {
            font-size: 18px;
            cursor: pointer;
        }
        .section {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>Configuración de NG CPT</h2>

<div class="section">   <!-- Apertura automática -->
    <label>
        <input type="checkbox" id="autoOpen">
        Activar apertura automática de la herramienta al visitar una orden de NG
    </label>
</div>

<hr>

<div class="section"> <!-- Corrector de matrículas -->
    <label>
        <input type="checkbox" id="enableMatShortcut">
        Activar el atajo para el corrector de matrículas de NG. <br>
        Utilízalo seleccionando una matrícula válida y pulsando Ctrl + Shift + X<br>
        <h5>NOTA: Puede generar conflictos con matrículas de policía y guardia civil, que comienzan con letras.</h5>
    </label>
</div>

<hr>

<div class="section">   <!-- Posición por defecto de la barra -->
    <label for="barraPos" style="font-size:18px;">
        <select id="barraPos" style="font-size:16px; padding:6px;">
        <option value="right">Derecha</option>
        <option value="left">Izquierda</option>
    </select>
        Posición por defecto de la barra (puedes moverla en cada OR, pero se abrirá aquí cuando visites una nueva):
    </label>
    
</div>

<hr>

<div class="section">  <!-- Nombre del técnico -->
    <label for="nombreTecnico" style="font-size:18px; display:block; margin-bottom:6px;">
        Nombre del técnico (se usará al generar textos):
    </label>
    <input type="text" id="nombreTecnico" 
           style="font-size:16px; padding:6px; width:280px;"
           placeholder="de la red de flotas">
</div>





<script src="options.js"></script>

</body>
</html>
